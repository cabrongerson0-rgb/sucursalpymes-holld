[phases.setup]
nixPkgs = ["php81", "php81Extensions.curl", "php81Extensions.mbstring", "php81Extensions.json", "php81Extensions.session"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --classmap-authoritative"]

[phases.build]
cmds = [
    "mkdir -p storage/logs",
    "mkdir -p storage/sessions",
    "chmod -R 755 storage"
]

[start]
cmd = "php -d opcache.enable=1 -d opcache.enable_cli=1 -d opcache.memory_consumption=128 -d opcache.max_accelerated_files=10000 -S 0.0.0.0:$PORT -t public"
